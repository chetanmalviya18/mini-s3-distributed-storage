version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      - POSTGRES_USER:postgres
      - POSTGRES_PASSWORD:postgres
      - POSTGRES_DB:mini_s3
    ports:
      - "5432:5432"

  main-server:
    build: ./main-server
    container_name: main_server
    ports:
      - "2000:2000"
    depends_on:
      - postgres
      - storage1
      - storage2
      - storage3
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mini_s3

  storage1:
    build: ./storage-server
    container_name: storage1
    ports:
      - "4001:4000"
    environment:
      PORT: 4000

  storage2:
    build: ./storage-node
    container_name: storage2
    ports:
      - "4002:4000"
    environment:
      PORT: 4000

  storage3:
    build: ./storage-node
    container_name: storage3
    ports:
      - "4003:4000"
    environment:
      PORT: 4000
